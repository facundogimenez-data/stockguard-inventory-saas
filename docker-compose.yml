services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${DB_NAME:-stockguard_demo}
      MYSQL_USER: ${DB_USER:-demo_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-demo_password}
    ports:
      - "3308:3306"
    volumes:
      - stockguard_db:/var/lib/mysql
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  dashboard:
    build: .
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER:-demo_user}
      DB_PASSWORD: ${DB_PASSWORD:-demo_password}
      DB_NAME: ${DB_NAME:-stockguard_demo}
    ports:
      - "8503:8501"

volumes:
  stockguard_db:
